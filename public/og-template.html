<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TradingDek OG image template</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    body { margin: 0; background: #1a2540; font-family: 'IBM Plex Sans', system-ui, sans-serif; }

    /* Screenshot the .canvas region at 1200x630, save as public/og.png. */
    .canvas {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #0a0e1a 0%, #1a1530 50%, #0a0e1a 100%);
      color: #f1f5f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px;
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(168, 117, 255, 0.10) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: radial-gradient(ellipse at center, black 60%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 60%, transparent 100%);
    }

    .glow {
      position: absolute;
      top: -120px; right: -120px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(134, 59, 255, 0.35), transparent 70%);
      filter: blur(20px);
    }

    .badge {
      display: inline-block;
      padding: 8px 16px;
      border: 1px solid rgba(134, 59, 255, 0.4);
      border-radius: 999px;
      font-size: 14px;
      color: #c4a8ff;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 28px;
      z-index: 1;
      background: rgba(134, 59, 255, 0.05);
    }

    h1 {
      font-size: 96px;
      font-weight: 800;
      line-height: 1.05;
      text-align: center;
      margin: 0;
      z-index: 1;
      letter-spacing: -3px;
    }
    .accent { color: #a875ff; }

    .tagline {
      margin-top: 32px;
      font-size: 22px;
      color: #94a3b8;
      text-align: center;
      max-width: 760px;
      z-index: 1;
      line-height: 1.4;
    }

    .wordmark {
      position: absolute;
      bottom: 56px;
      left: 56px;
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 1;
    }
    .wordmark .icon {
      width: 40px; height: 40px;
      background: #863bff;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(134, 59, 255, 0.4);
    }
    .wordmark .text { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }

    .url {
      position: absolute;
      bottom: 56px;
      right: 56px;
      font-size: 18px;
      color: #94a3b8;
      font-family: 'JetBrains Mono', monospace;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="grid"></div>
    <div class="glow"></div>

    <div class="badge">Multi-venue · Signals · Paper bots</div>

    <h1>Your trading deck.<br><span class="accent">One screen.</span></h1>

    <div class="tagline">
      Live signal scanner and paper-trading bots across Binance and Hyperliquid.
    </div>

    <div class="wordmark">
      <div class="icon">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3v18h18"/>
          <path d="M18 17V9"/>
          <path d="M13 17V5"/>
          <path d="M8 17v-3"/>
        </svg>
      </div>
      <div class="text">Trading<span style="color:#a875ff">Dek</span></div>
    </div>

    <div class="url">tradingdek.com</div>
  </div>
</body>
</html>
