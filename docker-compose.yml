# TradingDek — two-service stack for Coolify-on-Hetzner deploy.
#
#   spa         → static SPA bundle behind nginx, port 80
#   pocketbase  → custom Go binary + PocketBase admin + SIWE + NOWPay
#                 webhook + Binance proxy, port 8090
#
# Coolify (recommended): "New Resource → Docker Compose" → point at
# this repo. Assign domain + TLS to each service through the Coolify
# UI — no Caddy file required. See docs/DEPLOYMENT_COOLIFY.md for the
# step-by-step click guide.
#
# Bare Docker (advanced): cp .env.example .env, fill values,
# `docker compose up -d --build`. Front it with Caddy from
# Caddyfile.example.

services:
  spa:
    build:
      context: .
      dockerfile: Dockerfile
      # Vite envs are baked at build time, NOT runtime. Coolify
      # forwards UI-set env vars into these build args. Empty → feature off.
      args:
        VITE_API_BASE: ${VITE_API_BASE:-}
        VITE_NOWPAY_PUBLIC_KEY: ${VITE_NOWPAY_PUBLIC_KEY:-}
        VITE_PLAUSIBLE_DOMAIN: ${VITE_PLAUSIBLE_DOMAIN:-}
        VITE_FEEDBACK_EMAIL: ${VITE_FEEDBACK_EMAIL:-}
        VITE_BINANCE_REST_BASE: ${VITE_BINANCE_REST_BASE:-}
        VITE_ERROR_REPORT_ENDPOINT: ${VITE_ERROR_REPORT_ENDPOINT:-}
        VITE_HYPERLIQUID_BUILDER_CODE: ${VITE_HYPERLIQUID_BUILDER_CODE:-}
        VITE_HYPERLIQUID_NETWORK: ${VITE_HYPERLIQUID_NETWORK:-mainnet}
        VITE_CRYPTOPANIC_TOKEN: ${VITE_CRYPTOPANIC_TOKEN:-}
        VITE_HL_WHALE_WALLETS: ${VITE_HL_WHALE_WALLETS:-}
        VITE_ADMIN_KEY: ${VITE_ADMIN_KEY:-}
    container_name: tradingdek-spa
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

  pocketbase:
    build: ./backend/pocketbase
    container_name: tradingdek-pb
    restart: unless-stopped
    environment:
      NOWPAY_IPN_SECRET: ${NOWPAY_IPN_SECRET}
      PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL:-}
      PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD:-}
      PB_ENCRYPTION_KEY: ${PB_ENCRYPTION_KEY:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      # AI signal explainer (Pro feature). Leave empty to disable
      # the feature entirely — the endpoint returns 503.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      # Admin metrics dashboard — leave empty to disable the endpoint.
      ADMIN_DASHBOARD_KEY: ${ADMIN_DASHBOARD_KEY:-}
    volumes:
      - pb_data:/pb_data
    expose:
      - "8090"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  pb_data:
    driver: local
