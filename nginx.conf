# nginx config for the TradingDek SPA static bundle.
#
# SPA fallback (`try_files`) is the load-bearing part — any unknown
# URL (e.g. /trade/ETH-PERP refreshed deep) must serve index.html so
# the React router can handle it, otherwise refreshes 404.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/x-javascript
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # Vite emits hashed filenames under /assets — immutable is safe.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(?:png|jpg|jpeg|webp|avif|svg|ico|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # SPA history fallback — must come AFTER the static-asset matches.
    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
}
